scan:
  default_ports: "80,443,8080,8443,8000-9000"
  nmap_timing: "T3"
  nikto_timeout: 600
  max_parallel_workers: 5

nuclei:
  enabled: true
  severity: "critical,high,medium"
  rate_limit: 150
  timeout: 600

ffuf:
  enabled: true
  wordlist: /usr/share/seclists/Discovery/Web-Content/common.txt"     # ganti jika punya wordlist lain
  threads: 50
  timeout: 600
  extensions: "php,asp,aspx,html,txt,backup,bak,old"   # ekstensi yang dicari
  max_time_per_target: 300                              # batas waktu per target (detik)
  follow_redirect: true                  # kosong = default, atau path spesifik

reporting:
  output_dir: "output"
  report_dir: "reports"

evasion:
  enabled: false
  delay_between_targets: 1.5

general:
  version: "0.5.0"
  name: "PurpleScan"